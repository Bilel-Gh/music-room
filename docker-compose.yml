networks:
  local:
    name: local

services:
  backend:
    container_name: backend
    image: node:latest
    volumes:
      - ./:/src/
    command: bash -c "cd /src/ && make install dev"
    networks:
    - local
    restart: always

  frontend:
    container_name: frontend
    image: node:latest
    env_file:
      - .env
    volumes:
      - ./:/src/
    command: bash -c "cd /src/ && make install dev-mobile"
    networks:
    - local
    restart: always

  nginx:
    container_name: nginx
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    networks:
      - local
    depends_on:
      - frontend
      - backend
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    env_file: ".env"
    command:
      - "start"
      - "--all"
      - "--config"
      - "/etc/ngrok.yml"
    volumes:
      - ./ngrok.yml:/etc/ngrok.yml
    ports:
      - 4040:4040
    depends_on:
      - nginx
    networks:
      - local