networks:
  local:
    name: local

services:
  backend:
    container_name: backend
    image: node:latest
    volumes:
      - ./:/src/
    command: bash -c "cd /src/ && make install dev"
    networks:
    - local

  frontend:
    container_name: frontend
    image: node:latest
    env_file:
      - .env
    volumes:
      - ./:/src/
    command: bash -c "cd /src/ && make install dev-mobile"
    networks:
    - local

  nginx:
    container_name: nginx
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    networks:
      - local
    depends_on:
      - frontend
      - backend
